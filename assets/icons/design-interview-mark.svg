<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">design-interview mark</title>
  <desc id="desc">An Eye of Horus (wedjat) hieroglyph: a copper slop brow over a teal discerning eye, a warm preserved-claim pupil, and a copper restoring tail — the scrutiny that turns AI slop into a sound page.</desc>

  <!-- eyebrow: copper = raw slop input arching over the gaze -->
  <path d="M130 160 Q256 92 406 142" fill="none" stroke="#c46a2a" stroke-width="28" stroke-linecap="round"/>

  <!-- eye almond: teal = the clean, discerning built eye -->
  <path d="M112 250 Q210 176 320 182 Q380 188 414 206 Q360 256 286 290 Q190 300 112 250 Z" fill="none" stroke="#2dd4bf" stroke-width="24" stroke-linejoin="round"/>

  <!-- teardrop marking: teal -->
  <path d="M226 300 L221 392" fill="none" stroke="#2dd4bf" stroke-width="22" stroke-linecap="round"/>

  <!-- spiral tail: copper = restoration sweeping back (wedjat = made whole) -->
  <path d="M292 296 C362 312 396 360 374 400 C356 434 306 432 296 402 C289 382 308 366 328 378" fill="none" stroke="#c46a2a" stroke-width="22" stroke-linecap="round"/>

  <!-- preserved-claim core: warm pupil under scrutiny -->
  <circle cx="268" cy="236" r="34" fill="#ffe6a8" stroke="#020617" stroke-width="12"/>
</svg>
