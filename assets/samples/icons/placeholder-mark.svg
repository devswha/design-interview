        fill="none" stroke="#333333" stroke-width="2"/>
  <line x1="3" y1="20" x2="37" y2="20" stroke="#333333" stroke-width="2"/>
  <line x1="20" y1="3" x2="20" y2="37" stroke="#333333" stroke-width="2"/>
  <circle cx="20" cy="20" r="4" fill="#333333"/>
