<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!--
    paper-noise.svg — CC0 자작 종이 노이즈 텍스처.
    feTurbulence로 생성된 fractalNoise 패턴.
    배경 오버레이로 opacity를 조정해 사용.
  -->
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.65"
        numOctaves="3"
        seed="2"
        stitchTiles="stitch"
        result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#f5f5f0"/>
  <rect width="200" height="200" fill="#ffffff" filter="url(#paper)" opacity="0.35"/>
</svg>
