<!doctype html>
<html>
<head><meta charset="utf-8"><title>Main Small Paragraph</title>
<style>
  body{margin:0;font-family:Arial,sans-serif;font-size:16px}
  main{max-width:480px;margin:0 auto;padding:48px 0}
  .fine{font-size:13px}
</style></head>
<body>
  <!-- TY2 (b)팔 fail 픽스처: <main> 안 80자 초과 본문이 13px —
       행길이(480/13 ≈ 37em)는 (a)팔을 통과하므로 (b)팔만 발화한다. -->
  <main>
    <h2>Terms of service digest</h2>
    <p class="fine">Subscriptions renew automatically at the end of each billing period unless cancelled at least one day in advance.</p>
  </main>
</body>
</html>
