<!doctype html>
<html>
<head><meta charset="utf-8"><title>No Main Small Paragraph</title>
<style>
  body{margin:0;font-family:Arial,sans-serif;font-size:16px}
  .wrap{max-width:480px;margin:0 auto;padding:48px 0}
  .fine{font-size:13px}
</style></head>
<body>
  <!-- main-small-paragraph.html과 동일하되 <main>이 없는 변형 —
       TY2 (b)팔은 <main> 없는 페이지를 조용히 건너뛴다(문서화된 허용 미검출). -->
  <div class="wrap">
    <h2>Terms of service digest</h2>
    <p class="fine">Subscriptions renew automatically at the end of each billing period unless cancelled at least one day in advance.</p>
  </div>
</body>
</html>
