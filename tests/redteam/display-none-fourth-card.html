<!doctype html>
<html>
<head><meta charset="utf-8"><title>Hidden Fourth Card Bypass</title>
<style>
  body{margin:0;font-family:Arial,sans-serif}
  .grid{display:flex;gap:24px;justify-content:center;padding:48px}
  .card{width:280px;height:180px;border:1px solid #bbb;padding:16px;box-sizing:border-box;background:#fff}
  .hidden{display:none}
</style></head>
<body>
  <section class="grid">
    <article class="card"><h3>Alpha</h3><p>Visible card one.</p></article>
    <article class="card"><h3>Beta</h3><p>Visible card two.</p></article>
    <article class="card"><h3>Gamma</h3><p>Visible card three.</p></article>
    <article class="card hidden"><h3>Delta</h3><p>Hidden card four.</p></article>
  </section>
</body>
</html>
