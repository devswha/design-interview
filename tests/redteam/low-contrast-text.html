<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Low contrast text</title>
<style>
  body{margin:0;background:#ffffff;color:#1f1d1a;font-family:system-ui,sans-serif;line-height:1.6}
  main{max-width:720px;padding:64px 48px}
  h1{font-size:32px;line-height:1.2;margin:0 0 24px;color:#1f1d1a}
  p{font-size:18px;margin:0;color:#8a8a8a;max-width:36em}
</style>
</head>
<body>
<main>
  <h1>대비가 충분하지 않은 본문</h1>
  <p>이 문단은 단색 흰 배경 위에 낮은 대비의 회색 잉크로 렌더됩니다. 시각 대비 레인은 이 문장을 WCAG 상대 휘도 공식으로 계산해 본문 기준 4.5대 1 미만으로 판정해야 합니다.</p>
</main>
</body>
</html>
