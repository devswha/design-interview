<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Large text contrast threshold</title>
<style>
  body{margin:0;background:#ffffff;color:#1f1d1a;font-family:system-ui,sans-serif;line-height:1.5}
  main{max-width:720px;padding:64px 48px}
  h1{font-size:32px;line-height:1.2;margin:0 0 24px;color:#777777;font-weight:700}
  p{font-size:18px;margin:0;color:#1f1d1a;max-width:36em}
</style>
</head>
<body>
<main>
  <h1>큰 글자는 3대 1 기준을 사용합니다</h1>
  <p>본문은 충분한 대비로 렌더됩니다. 제목은 본문 기준 4.5대 1에는 조금 못 미치지만 큰 글자 기준 3대 1을 넘기므로 통과해야 합니다.</p>
</main>
</body>
</html>
