<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Hangul mid-word break</title>
<style>
  body{margin:0;font-family:Pretendard,'Noto Sans KR',sans-serif}
  main{max-width:760px;margin:0 auto;padding:48px}
  /* 좁은 컬럼 + word-break:keep-all 누락 → 공백 없는 한글이 어절 중간에서 끊긴다 */
  .card{width:120px;font-size:20px;line-height:1.6;border:1px solid #cbd5c0;padding:10px}
</style>
</head>
<body>
<main>
  <h1>제품 소개</h1>
  <p class="card">디자인인터뷰는사용자와상담한뒤그컨셉에맞는페이지를짓는결정론적도구입니다</p>
</main>
</body>
</html>
