<!doctype html>
<html>
<head><meta charset="utf-8"><title>Two Card Grid Boundary</title>
<style>
  body{margin:0;font-family:Arial,sans-serif}
  .grid{display:flex;gap:24px;justify-content:center;padding:48px}
  .card{width:280px;height:180px;border:1px solid #bbb;padding:16px;box-sizing:border-box;background:#fff}
</style></head>
<body>
  <section class="grid">
    <article class="card"><h3>Alpha</h3><p>One visible card.</p></article>
    <article class="card"><h3>Beta</h3><p>Second visible card.</p></article>
  </section>
</body>
</html>
