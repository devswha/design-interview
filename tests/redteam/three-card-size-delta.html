<!doctype html>
<html>
<head><meta charset="utf-8"><title>Three Card Size Delta Boundary</title>
<style>
  body{margin:0;font-family:Arial,sans-serif}
  .grid{display:flex;gap:24px;justify-content:center;padding:48px}
  .card{width:280px;height:180px;border:1px solid #bbb;padding:16px;box-sizing:border-box;background:#fff}
  .card.wide{width:285px}
</style></head>
<body>
  <section class="grid">
    <article class="card"><h3>Alpha</h3><p>First service block.</p></article>
    <article class="card wide"><h3>Beta</h3><p>Five pixels wider.</p></article>
    <article class="card"><h3>Gamma</h3><p>Third service block.</p></article>
  </section>
</body>
</html>
