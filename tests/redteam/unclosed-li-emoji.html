<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><title>unclosed li emoji</title>
<style>body{background:#faf8f4;color:#1f1d1a;font-family:Georgia,serif}</style></head>
<body>
  <h1>오늘의 메뉴</h1>
  <!-- li가 닫히지 않은 HTML5-유효 마크업: emoji-bullet 슬롭이 게이트를 우회하면 안 됨 -->
  <ul>
    <li>🚀 빠른 배송
    <li>⚡ 신선한 재료
    <li>✨ 정성스런 손맛
  </ul>
  <p>전화로 예약하세요.</p>
</body>
</html>
