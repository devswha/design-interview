<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Hangul keep-all clean</title>
<style>
  body{margin:0;font-family:Pretendard,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  main{max-width:760px;margin:0 auto;padding:48px}
  /* 어절 사이 공백 + keep-all → 줄바꿈은 공백에서만, 어절 중간 끊김 없음 */
  .card{max-width:220px;font-size:18px;line-height:1.7;word-break:keep-all;overflow-wrap:break-word}
</style>
</head>
<body>
<main>
  <h1>제품 소개</h1>
  <p class="card">디자인 인터뷰는 사용자와 상담한 뒤 그 컨셉에 맞는 페이지를 짓는 도구입니다</p>
</main>
</body>
</html>
