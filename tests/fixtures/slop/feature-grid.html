<!doctype html>
<html>
<head><meta charset="utf-8"><title>Feature Grid</title>
<style>
  body{margin:0;font-family:sans-serif}
  .grid{display:flex;gap:24px;justify-content:center;padding:48px;text-align:center}
  .card{width:280px;height:180px;border:1px solid #ddd;padding:16px;box-sizing:border-box}
</style></head>
<body>
  <!-- 정적 텔은 전부 통과하는 픽스처 — L1(균일 그리드)·S3(완전 대칭)는
       렌더해야만 보인다. M3 시각 레인이 닫는 간극의 증거. -->
  <section class="grid">
    <div class="card"><h3>속도</h3><p>빠른 동기화를 지원합니다.</p></div>
    <div class="card"><h3>보안</h3><p>저장 시 암호화합니다.</p></div>
    <div class="card"><h3>협업</h3><p>동시 편집이 가능합니다.</p></div>
  </section>
</body>
</html>
